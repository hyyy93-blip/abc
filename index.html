<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>abc</title>
<style>
  :root {
    color-scheme: light dark;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f1115;
    color: #f5f5f7;
  }
  @media (prefers-color-scheme: light) {
    body { background: #f5f5f7; color: #0f1115; }
    .card { background: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .subtitle { color: #555; }
  }
  .card {
    max-width: 560px;
    width: 90%;
    padding: 3rem 2.5rem;
    border-radius: 20px;
    background: #171a21;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
  }
  h1 {
    font-size: 2.4rem;
    margin: 0 0 0.75rem;
    letter-spacing: -0.02em;
  }
  .subtitle {
    font-size: 1.1rem;
    color: #a8adb8;
    margin: 0 0 2rem;
    line-height: 1.6;
  }
  .badge {
    display: inline-block;
    padding: 0.4rem 1rem;
    border-radius: 999px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  footer {
    margin-top: 2.5rem;
    font-size: 0.8rem;
    color: #6b7280;
  }
</style>
</head>
<body>
  <div class="card">
    <span class="badge">abc</span>
    <h1>Welcome to abc</h1>
    <p class="subtitle">이 페이지는 GitHub Pages를 통해 배포된 간단한 소개 페이지입니다.</p>
    <footer>&copy; 2026 abc</footer>
  </div>
</body>
</html>
